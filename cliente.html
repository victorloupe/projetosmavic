<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIC — Meus Projetos</title>
<link rel="icon" type="image/x-icon" href="icon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="cliente.css">
<!-- supabase-js e config.js removidos: o cliente não acessa o banco diretamente.
     Os dados chegam via Edge Function com autenticação server-side. -->
</head>
<body>

<div class="loading" id="loading">
  <div class="spin"></div>
  <div style="font-weight:600;font-size:14px">Carregando projetos…</div>
  <div id="loadingText" style="font-size:12px;color:var(--text3)">Conectando ao MAVIC</div>
</div>

<div id="errorScreen" class="error-screen d-none">
  <i id="errIcon" class="bi bi-exclamation-triangle"></i>
  <h5 id="errTitle" style="font-weight:700;font-size:18px"></h5>
  <p id="errMsg" style="font-size:13px;max-width:360px"></p>
</div>

<nav class="nav">
  <div class="nav-brand">
    <img id="navLogo" src="LOGO NOVA.png" alt="MAVIC" class="nav-logo" onerror="this.style.display='none'">
    <div>
      <div class="nav-name">MAVIC Projetos</div>
      <div class="nav-sub"><i class="bi bi-person-check-fill" style="color:var(--accent)"></i> <strong id="clientLabel">—</strong></div>
    </div>
  </div>
  <div class="nav-sep"></div>
  <div class="fin-bar">
    <div class="fin-item">
      <div class="fin-lbl"><i class="bi bi-cash-stack"></i> Confirmado</div>
      <div class="fin-val pago" id="totalPago">R$ 0,00</div>
    </div>
    <div class="fin-sep"></div>
    <div class="fin-item">
      <div class="fin-lbl"><i class="bi bi-exclamation-circle"></i> A Pagar</div>
      <div class="fin-val rest" id="totalRest">R$ 0,00</div>
    </div>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-search"><i class="bi bi-search"></i><input id="srch" placeholder="Buscar projeto…" oninput="renderBoard()"></div>
  <div class="nav-sep"></div>
  <button class="btn-icon" onclick="loadData()" title="Atualizar"><i class="bi bi-arrow-clockwise"></i></button>
  <button class="btn-icon" id="themeBtn" onclick="toggleTheme()" title="Tema"><i class="bi bi-moon-stars-fill"></i></button>
</nav>

<!-- FIN BAR MOBILE -->
<div class="fin-bar-mobile">
  <div class="fin-item">
    <div class="fin-lbl"><i class="bi bi-cash-stack"></i> Confirmado</div>
    <div class="fin-val pago" id="totalPagoM">R$ 0,00</div>
  </div>
  <div class="fin-sep"></div>
  <div class="fin-item">
    <div class="fin-lbl"><i class="bi bi-exclamation-circle"></i> A Pagar</div>
    <div class="fin-val rest" id="totalRestM">R$ 0,00</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <select class="inp btn-sm" id="fType" onchange="renderBoard()" style="width:auto">
    <option value="">Todos os Tipos</option>
    <option>Residencial</option><option>Comercial</option><option>Estrutural</option><option>Urbanismo</option><option>Outro</option>
  </select>
  <div style="flex:1"></div>
  <span id="boardCount" style="font-size:12px;color:var(--text3)"></span>
</div>

<!-- NOTIFICATIONS -->
<div class="notif-wrap d-none" id="notifWrap">
  <div class="notif-banner" id="notifBanner"></div>
</div>

<!-- BOARD VIEW -->
<div class="board-view" id="boardView">
  <div class="board-outer"><div class="board" id="board"></div></div>
</div>

<script src="cliente.js"></script>
</body>
</html>
