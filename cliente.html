<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAVIC — Meus Projetos</title>
<link rel="icon" type="image/x-icon" href="icon.ico">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{--bg:#f4f4f5;--surface:#fff;--surface2:#f4f4f5;--border:#e4e4e7;--border2:#d4d4d8;--text:#09090b;--text2:#52525b;--text3:#a1a1aa;--accent:#92623a;--accent2:#7a5230;--accent-bg:rgba(146,98,58,.09);--green:#16a34a;--green-bg:#dcfce7;--red:#dc2626;--red-bg:#fee2e2;--yellow:#d97706;--yellow-bg:#fef3c7;--blue:#2563eb;--blue-bg:#dbeafe;--purple:#7c3aed;--purple-bg:#ede9fe;--teal:#0d9488;--teal-bg:#ccfbf1;--r:10px;--sh:0 1px 4px rgba(0,0,0,.07);--sh2:0 4px 14px rgba(0,0,0,.10);--sh3:0 8px 32px rgba(0,0,0,.14)}
[data-theme="dark"]{--bg:#09090b;--surface:#18181b;--surface2:#27272a;--border:#3f3f46;--border2:#52525b;--text:#fafafa;--text2:#a1a1aa;--text3:#71717a;--accent:#c08850;--accent2:#d4a373;--accent-bg:rgba(192,136,80,.13);--green-bg:#14532d;--red-bg:#450a0a;--yellow-bg:#422006;--blue-bg:#1e3a5f;--purple-bg:#3b0764;--teal-bg:#042f2e;--sh:0 1px 4px rgba(0,0,0,.3);--sh2:0 4px 14px rgba(0,0,0,.4);--sh3:0 8px 32px rgba(0,0,0,.5)}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',-apple-system,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* NAV */
.nav{background:var(--surface);border-bottom:1px solid var(--border);height:54px;display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0;z-index:100}
.nav-brand{display:flex;align-items:center;gap:9px}
.nav-logo{height:34px;object-fit:contain}
.nav-name{font-weight:700;font-size:14.5px;letter-spacing:-.3px}
.nav-sub{font-size:11px;color:var(--text3);margin-top:-1px}
.nav-sub strong{color:var(--accent)}
.nav-sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.nav-spacer{flex:1}

/* FIN BAR in nav */
.fin-bar{display:flex;gap:16px;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 14px}
.fin-item{display:flex;flex-direction:column;line-height:1.3}
.fin-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3)}
.fin-val{font-weight:700;font-family:'Courier New',monospace;font-size:14px}
.fin-val.pago{color:var(--green)}.fin-val.rest{color:var(--red)}
.fin-sep{width:1px;height:26px;background:var(--border)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--r);font:500 13px/1.4 inherit;cursor:pointer;border:none;transition:all .15s;white-space:nowrap}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-icon{padding:6px;border-radius:8px;background:transparent;color:var(--text2);border:1px solid transparent}.btn-icon:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
.btn-sm{padding:4px 9px;font-size:12.5px}
.inp{background:var(--surface2);border:1px solid var(--border);border-radius:var(--r);color:var(--text);font:inherit;font-size:13px;padding:5px 8px;outline:none;cursor:pointer;transition:border .15s}
.inp:focus{border-color:var(--accent)}

/* TOOLBAR */
.toolbar{background:var(--surface);border-bottom:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;gap:7px;flex-shrink:0;flex-wrap:wrap}

/* SEARCH */
.nav-search{position:relative}
.nav-search i{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px;pointer-events:none}
.nav-search input{padding:5px 9px 5px 28px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font:inherit;font-size:13px;outline:none;width:200px;transition:border .15s,box-shadow .15s}
.nav-search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg)}

/* BOARD */
.board-view{flex:1;overflow:hidden;display:flex;flex-direction:column}
.board-outer{flex:1;overflow-x:auto;overflow-y:hidden;padding:14px}
.board{display:flex;gap:11px;height:100%;align-items:flex-start}

/* COLUMN */
.kcol{width:288px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;max-height:100%}
.kcol-hdr{padding:10px 10px 8px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.kcol-title{font-weight:700;font-size:13px;display:flex;align-items:center;gap:6px}
.kcol-cnt{background:var(--border);color:var(--text2);font-size:11px;font-weight:700;padding:1px 6px;border-radius:20px;font-family:'Courier New',monospace}
.kdrop{flex:1;overflow-y:auto;padding:7px;display:flex;flex-direction:column;gap:5px;min-height:80px}
.kdrop::-webkit-scrollbar{width:4px}
.kdrop::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.kempty{border:1.5px dashed var(--border2);border-radius:8px;padding:18px;text-align:center;color:var(--text3);font-size:12px}

/* CARD */
.kcard{background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:box-shadow .2s,border-color .2s;overflow:hidden;position:relative;user-select:none}
.kcard:hover{box-shadow:var(--sh2);border-color:var(--border2)}
.kcard.pinned{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg),var(--sh2)}
.kcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:10px 0 0 10px}
.kcard.t-Residencial::before{background:var(--blue)}.kcard.t-Comercial::before{background:var(--purple)}
.kcard.t-Estrutural::before{background:var(--yellow)}.kcard.t-Urbanismo::before{background:var(--teal)}.kcard.t-Outro::before{background:var(--text3)}
.kcard-cover{width:100%;height:88px;object-fit:cover;border-bottom:1px solid var(--border)}
.kcard-body{padding:9px 9px 8px 13px}
.kcard-name{font-weight:600;font-size:13.5px;line-height:1.3;margin-bottom:3px}
.kcard-tags{display:flex;flex-wrap:wrap;gap:4px}
.kcard-exp{max-height:0;opacity:0;overflow:hidden;transition:max-height .3s ease,opacity .25s;padding:0 9px 0 13px}
.kcard:hover .kcard-exp,.kcard.pinned .kcard-exp{max-height:700px;opacity:1;padding-bottom:9px}
@media(max-width:768px){.kcard:not(.pinned) .kcard-exp{max-height:0!important;opacity:0!important;padding-bottom:0!important}}

/* BADGE */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;white-space:nowrap;font-family:'Courier New',monospace;letter-spacing:.2px}
.b-alta{background:var(--red-bg);color:var(--red)}.b-media{background:var(--yellow-bg);color:var(--yellow)}.b-baixa{background:var(--green-bg);color:var(--green)}
.b-pago{background:var(--green-bg);color:var(--green)}.b-parcial{background:var(--yellow-bg);color:var(--yellow)}.b-pendente{background:var(--red-bg);color:var(--red)}
.b-tResidencial{background:var(--blue-bg);color:var(--blue)}.b-tComercial{background:var(--purple-bg);color:var(--purple)}
.b-tEstrutural{background:var(--yellow-bg);color:var(--yellow)}.b-tUrbanismo{background:var(--teal-bg);color:var(--teal)}
.b-tOutro{background:var(--surface2);color:var(--text2)}.b-venc{background:var(--red-bg);color:var(--red)}.b-urg{background:var(--yellow-bg);color:var(--yellow)}

/* FIN BLOCK */
.fin-blk{background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:7px}
.fin-sum{padding:7px 9px;display:flex;flex-direction:column;gap:3px}
.fin-row{display:flex;justify-content:space-between;align-items:center;font-size:12px}
.fin-row .lbl{color:var(--text2)}.fin-row .val{font-weight:600;font-family:'Courier New',monospace}
.fin-hist-btn{width:100%;padding:5px 9px;text-align:left;background:var(--surface2);border:none;border-top:1px solid var(--border);font-size:11.5px;color:var(--text2);cursor:pointer;font-family:inherit;transition:color .15s}
.fin-hist-btn:hover{color:var(--accent)}
.fin-hist-rows{max-height:170px;overflow-y:auto}
.fin-hist-item{display:flex;justify-content:space-between;align-items:center;padding:5px 9px;font-size:11.5px;border-top:1px solid var(--border)}
.fin-hist-item .fv{color:var(--green);font-weight:700}

/* PRODUCTS TABLE */
.prod-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:7px;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.prod-table th{padding:6px 10px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border)}
.prod-table td{padding:7px 10px;border-bottom:1px solid var(--border)}
.prod-table tr:last-child td{border-bottom:none}

/* PROGRESS / SUBTASKS */
.prog{height:4px;background:var(--border);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .3s}
.prog-fill.done{background:var(--green)}
.sub-row{display:flex;align-items:center;gap:6px;padding:4px 7px;border-top:1px solid var(--border);font-size:12px}
.sub-row:first-child{border-top:none}
.sub-done{text-decoration:line-through;color:var(--text3)}

/* NOTIFICATIONS */
.notif-wrap{flex-shrink:0;padding:10px 14px 0}
.notif-banner{background:var(--green-bg);border:1px solid var(--green);border-radius:12px;padding:11px 14px;display:flex;flex-direction:column;gap:7px}
.notif-title{font-weight:700;font-size:12.5px;color:var(--green);display:flex;align-items:center;gap:6px}
.notif-item{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 13px}
.notif-msg{font-size:13px;font-weight:500;color:var(--text);line-height:1.5}
.notif-meta{font-size:11.5px;color:var(--text3);margin-top:3px;display:flex;align-items:center;gap:6px}

/* LOADING / ERROR */
.loading{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:rot .75s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.error-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:2rem;color:var(--text2)}
.error-screen i{font-size:3rem;color:var(--accent)}
.d-none{display:none!important}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:10px}
::-webkit-scrollbar-thumb:hover{background:var(--accent)}

/* MOBILE */
@media(max-width:768px){
  body{overflow:auto;height:auto}

  /* NAV */
  .nav{height:auto;padding:10px 12px 8px;flex-wrap:wrap;justify-content:center;gap:6px 8px}
  .nav-brand{width:100%;justify-content:center;flex-direction:row;align-items:center;gap:9px}
  .nav-brand .nav-logo{height:44px}
  .nav-brand > div{text-align:left}
  .nav-brand .nav-name{font-size:14px}
  .nav-brand .nav-sub{margin-top:0;font-size:12px}
  .nav-search{display:none}
  .nav-sep{display:none}
  .nav-spacer{display:none}
  .fin-bar{display:none}
  .fin-bar-mobile{display:flex!important}

  /* TOOLBAR */
  .toolbar{overflow-x:auto;flex-wrap:nowrap;padding:6px 10px}

  /* BOARD */
  .board-outer{overflow:visible;padding:10px}
  .board{flex-direction:column;height:auto;gap:8px}
  .kcol{width:100%}

  /* CARDS */
  .cbtn{width:32px;height:32px;font-size:14px}

  /* NOTIFICAÇÕES */
  .notif-wrap{padding:8px 10px 0}
}
.fin-bar-mobile{display:none;gap:0;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;flex-shrink:0}
.fin-bar-mobile .fin-item{flex:1;align-items:center}
.fin-bar-mobile .fin-sep{width:1px;height:32px;background:var(--border);margin:0 12px}
</style>
</head>
<body>

<div class="loading" id="loading">
  <div class="spin"></div>
  <div style="font-weight:600;font-size:14px">Carregando projetos…</div>
  <div id="loadingText" style="font-size:12px;color:var(--text3)">Conectando ao MAVIC</div>
</div>

<!-- ══ GLOBAL NOTICE MODAL ══ -->
<div id="gnOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px)">
  <div style="background:var(--surface);border-radius:16px;border:1px solid var(--border);box-shadow:var(--sh3);width:100%;max-width:480px;overflow:hidden">
    <div style="background:var(--yellow-bg);border-bottom:1px solid var(--yellow);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px">
      <div style="display:flex;align-items:center;gap:10px">
        <i class="bi bi-megaphone-fill" style="font-size:1.4rem;color:var(--yellow)"></i>
        <div>
          <div style="font-weight:700;font-size:14.5px;color:var(--yellow)">Aviso do Escritório MAVIC</div>
          <div style="font-size:11.5px;color:var(--text2);margin-top:1px" id="gnDate"></div>
        </div>
      </div>
      <span id="gnCounter" style="font-size:12px;font-weight:600;color:var(--yellow);background:rgba(217,119,6,.15);padding:3px 9px;border-radius:20px;white-space:nowrap"></span>
    </div>
    <div style="padding:20px 18px">
      <p id="gnMessage" style="font-size:14px;font-weight:500;color:var(--text);line-height:1.7"></p>
    </div>
    <div style="padding:12px 18px;border-top:1px solid var(--border);display:flex;justify-content:flex-end">
      <button onclick="dismissNotice()" style="display:inline-flex;align-items:center;gap:6px;padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font:600 13px/1 inherit;cursor:pointer">
        <i class="bi bi-check2-circle"></i> Entendido
      </button>
    </div>
  </div>
</div>

<div id="errorScreen" class="error-screen d-none">
  <i id="errIcon" class="bi bi-exclamation-triangle"></i>
  <h5 id="errTitle" style="font-weight:700;font-size:18px"></h5>
  <p id="errMsg" style="font-size:13px;max-width:360px"></p>
</div>

<nav class="nav">
  <div class="nav-brand">
    <img id="navLogo" src="LOGO NOVA.png" alt="MAVIC" class="nav-logo" onerror="this.style.display='none'">
    <div>
      <div class="nav-name">MAVIC Projetos</div>
      <div class="nav-sub"><i class="bi bi-person-check-fill" style="color:var(--accent)"></i> <strong id="clientLabel">—</strong></div>
    </div>
  </div>
  <div class="nav-sep"></div>
  <div class="fin-bar">
    <div class="fin-item">
      <div class="fin-lbl"><i class="bi bi-cash-stack"></i> Confirmado</div>
      <div class="fin-val pago" id="totalPago">R$ 0,00</div>
    </div>
    <div class="fin-sep"></div>
    <div class="fin-item">
      <div class="fin-lbl"><i class="bi bi-exclamation-circle"></i> A Pagar</div>
      <div class="fin-val rest" id="totalRest">R$ 0,00</div>
    </div>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-search"><i class="bi bi-search"></i><input id="srch" placeholder="Buscar projeto…" oninput="renderBoard()"></div>
  <div class="nav-sep"></div>
  <button class="btn-icon" onclick="loadData()" title="Atualizar"><i class="bi bi-arrow-clockwise"></i></button>
  <button class="btn-icon" id="themeBtn" onclick="toggleTheme()" title="Tema"><i class="bi bi-moon-stars-fill"></i></button>
</nav>

<!-- FIN BAR MOBILE -->
<div class="fin-bar-mobile">
  <div class="fin-item">
    <div class="fin-lbl"><i class="bi bi-cash-stack"></i> Confirmado</div>
    <div class="fin-val pago" id="totalPagoM">R$ 0,00</div>
  </div>
  <div class="fin-sep"></div>
  <div class="fin-item">
    <div class="fin-lbl"><i class="bi bi-exclamation-circle"></i> A Pagar</div>
    <div class="fin-val rest" id="totalRestM">R$ 0,00</div>
  </div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <select class="inp btn-sm" id="fType" onchange="renderBoard()" style="width:auto">
    <option value="">Todos os Tipos</option>
    <option>Residencial</option><option>Comercial</option><option>Estrutural</option><option>Urbanismo</option><option>Outro</option>
  </select>
  <div style="flex:1"></div>
  <span id="boardCount" style="font-size:12px;color:var(--text3)"></span>
</div>

<!-- NOTIFICATIONS -->
<div class="notif-wrap d-none" id="notifWrap">
  <div class="notif-banner" id="notifBanner"></div>
</div>

<!-- BOARD VIEW -->
<div class="board-view" id="boardView">
  <div class="board-outer"><div class="board" id="board"></div></div>
</div>

<script>
// ══════════════════════════════════════════
//  SUPABASE CREDENTIALS (hardcoded)
// ══════════════════════════════════════════
const SB_URL='https://ygwrpwkkriaeqaeuuxan.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlnd3Jwd2trcmlhZXFhZXV1eGFuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMTM5MjYsImV4cCI6MjA5NTU4OTkyNn0.WuWbVwgF1DAZLEMMTDR3WPpoLLfCu0HockD2ty4F9iA';

let sb=null,projects=[],clients=[],globalNotices=[],appColumns=[{id:'Briefing',icon:'📋'},{id:'Desenvolvimento',icon:'✏️'},{id:'Revisão',icon:'🔍'},{id:'Obra',icon:'🏗️'},{id:'Concluído',icon:'✅'}];
let notifications=[],appTheme='light';
let clientName='',clientToken='';
let pinnedCards=new Set(),expandedFin=new Set();

const params=new URLSearchParams(window.location.search);
clientName=(params.get('nome')||'').trim();
clientToken=(params.get('token')||'').trim();

function initSb(){
  sb=window.supabase.createClient(SB_URL,SB_KEY);
  return true;
}

async function loadData(){
  document.getElementById('loading').style.display='flex';
  document.getElementById('errorScreen').classList.add('d-none');
  document.getElementById('boardView').style.display='flex';
  if(!clientName){showError('bi-link-45deg','Link inválido','Nenhum cliente especificado na URL.');return;}
  document.getElementById('clientLabel').textContent=clientName;
  document.getElementById('loadingText').textContent=`Carregando projetos de ${clientName}`;

  initSb();
  try{
    const{data,error}=await sb.from('mavic_store').select('key,data');
    if(error)throw error;
    const map={};(data||[]).forEach(r=>map[r.key]=r.data);
    projects=map.projects||[];clients=map.clients||[];notifications=map.notifications||[];
    globalNotices=map.global_notices||(map.global_notice?[map.global_notice]:[]);
    const cfg=map.config||{};
    if(cfg.columns?.length)appColumns=cfg.columns;
    applyTheme(cfg.theme||localStorage.getItem('mavic_theme')||'light');
  }catch(e){
    console.warn(e);
    projects=JSON.parse(localStorage.getItem('mavic_projects')||'[]');
    clients=JSON.parse(localStorage.getItem('mavic_clients')||'[]');
    notifications=JSON.parse(localStorage.getItem('mavic_notifications')||'[]');
    globalNotices=JSON.parse(localStorage.getItem('mavic_global_notices')||'[]');
    const cfg=JSON.parse(localStorage.getItem('mavic_config')||'{}');
    if(cfg.columns?.length)appColumns=cfg.columns;
  }

  // Validate token
  const cli=clients.find(c=>c.name?.toLowerCase().trim()===clientName.toLowerCase());
  if(clientToken&&cli?.token&&cli.token!==clientToken){
    showError('bi-shield-lock','Acesso negado','Token inválido. Solicite um novo link ao escritório MAVIC.');
    return;
  }

  document.getElementById('loading').style.display='none';
  calcFinance();renderNotifications();renderBoard();
  checkGlobalNotice();
}

function showError(icon,title,msg){
  document.getElementById('loading').style.display='none';
  document.getElementById('boardView').style.display='none';
  document.getElementById('notifWrap').classList.add('d-none');
  document.getElementById('errorScreen').classList.remove('d-none');
  document.getElementById('errIcon').className='bi '+icon;
  document.getElementById('errTitle').textContent=title;
  document.getElementById('errMsg').textContent=msg;
}

function fmt(v){return parseFloat(v||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});}

function calcFinance(){
  let pago=0,rest=0;
  projects.filter(p=>!p.archived&&p.client?.toLowerCase().trim()===clientName.toLowerCase()).forEach(p=>{
    const t=parseFloat(p.value||0);const pg=(p.payments||[]).reduce((s,x)=>s+parseFloat(x.amount||0),0);
    pago+=pg;if(t-pg>0)rest+=t-pg;
  });
  const pF=fmt(pago),rF=fmt(rest);
  document.getElementById('totalPago').textContent=pF;
  document.getElementById('totalRest').textContent=rF;
  document.getElementById('totalPagoM').textContent=pF;
  document.getElementById('totalRestM').textContent=rF;
}

// ══════════════════════════════════════════
//  GLOBAL NOTICES (múltiplos)
// ══════════════════════════════════════════
let pendingNotices=[],currentNoticeIdx=0;

function checkGlobalNotice(){
  pendingNotices=globalNotices.filter(gn=>{
    if(!gn.active||!gn.message)return false;
    if(!gn.targetAll&&!gn.targetClients?.some(n=>n.toLowerCase()===clientName.toLowerCase()))return false;
    if(localStorage.getItem('mavic_notice_read_'+gn.id))return false;
    return true;
  });
  currentNoticeIdx=0;
  showCurrentNotice();
}
function showCurrentNotice(){
  if(currentNoticeIdx>=pendingNotices.length){document.getElementById('gnOverlay').style.display='none';return;}
  const gn=pendingNotices[currentNoticeIdx];
  document.getElementById('gnMessage').innerHTML=formatNoticeText(gn.message);
  const dt=new Date(gn.createdAt).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
  document.getElementById('gnDate').textContent=dt;
  const total=pendingNotices.length;
  document.getElementById('gnCounter').textContent=total>1?`${currentNoticeIdx+1} de ${total}`:'';
  document.getElementById('gnOverlay').style.display='flex';
}
function formatNoticeText(t){
  return t
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*([^*\n]+)\*/g,'<strong>$1</strong>')
    .replace(/_([^_\n]+)_/g,'<em>$1</em>')
    .replace(/\n/g,'<br>');
}
async function dismissNotice(){
  const gn=pendingNotices[currentNoticeIdx];
  if(gn){
    localStorage.setItem('mavic_notice_read_'+gn.id,'1');
    // registrar leitura no Supabase
    if(sb){
      try{
        const updated=globalNotices.map(n=>{
          if(n.id!==gn.id)return n;
          const readBy=Array.isArray(n.readBy)?[...n.readBy]:[];
          if(!readBy.includes(clientName))readBy.push(clientName);
          return{...n,readBy};
        });
        await sb.from('mavic_store').upsert([{key:'global_notices',data:updated}],{onConflict:'key'});
      }catch(e){console.warn('readBy update failed',e);}
    }
  }
  currentNoticeIdx++;
  showCurrentNotice();
}

function toggleTheme(){appTheme=appTheme==='light'?'dark':'light';applyTheme(appTheme);localStorage.setItem('mavic_theme',appTheme);}
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);appTheme=t;
  const btn=document.getElementById('themeBtn'),logo=document.getElementById('navLogo');
  if(t==='dark'){btn.innerHTML='<i class="bi bi-sun-fill" style="color:#fbbf24"></i>';if(logo)logo.src='https://i.postimg.cc/vZmmNLjj/LOGO-NOVA-black.png';}
  else{btn.innerHTML='<i class="bi bi-moon-stars-fill"></i>';if(logo)logo.src='LOGO NOVA.png';}
}

// ══════════════════════════════════════════
//  NOTIFICATIONS
// ══════════════════════════════════════════
function getNotifDismissed(){return JSON.parse(localStorage.getItem('mavic_notif_read_'+clientName)||'[]');}
function dismissNotif(id){
  const d=getNotifDismissed();if(!d.includes(id))d.push(id);
  localStorage.setItem('mavic_notif_read_'+clientName,JSON.stringify(d));
  renderNotifications();
}
function renderNotifications(){
  const wrap=document.getElementById('notifWrap');
  const cli=clients.find(c=>c.name?.toLowerCase().trim()===clientName.toLowerCase());
  if(!cli?.token){wrap.classList.add('d-none');return;}
  const dismissed=getNotifDismissed();
  const myNotifs=notifications
    .filter(n=>n.clientToken===cli.token&&!dismissed.includes(n.id))
    .sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);
  if(!myNotifs.length){wrap.classList.add('d-none');return;}
  wrap.classList.remove('d-none');
  document.getElementById('notifBanner').innerHTML=`
    <div class="notif-title"><i class="bi bi-bell-fill"></i> Avisos do Escritório <span style="background:var(--green);color:#fff;padding:1px 7px;border-radius:20px;font-size:11px">${myNotifs.length}</span></div>
    ${myNotifs.map(n=>{
      const dt=new Date(n.createdAt).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
      return `<div class="notif-item" style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px">
        <div style="flex:1">
          <div class="notif-msg">${n.message}</div>
          <div class="notif-meta"><i class="bi bi-calendar3"></i>${dt}${n.projectName?` &middot; <i class="bi bi-folder2"></i> ${n.projectName}`:''}</div>
        </div>
        <button onclick="dismissNotif(${n.id})" title="Marcar como lido" style="flex-shrink:0;margin-top:2px;background:var(--green-bg);border:1px solid var(--green);color:var(--green);border-radius:6px;padding:3px 9px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:4px">
          <i class="bi bi-check2"></i> Confirmar
        </button>
      </div>`;
    }).join('')}`;
}

// ══════════════════════════════════════════
//  BOARD
// ══════════════════════════════════════════
function renderBoard(){
  const board=document.getElementById('board');board.innerHTML='';
  const srch=document.getElementById('srch').value.toLowerCase().trim();
  const fType=document.getElementById('fType').value;
  const myProjs=projects.filter(p=>!p.archived
    &&p.client?.toLowerCase().trim()===clientName.toLowerCase()
    &&(!fType||p.type===fType)
    &&(!srch||p.name?.toLowerCase().includes(srch)));
  let total=0;
  appColumns.forEach(col=>{
    const colProjs=myProjs.filter(p=>p.column===col.id);
    if(!colProjs.length&&window.innerWidth<=768)return;
    total+=colProjs.length;
    const el=document.createElement('div');el.className='kcol';
    el.innerHTML=`
      <div class="kcol-hdr">
        <div class="kcol-title">${col.icon} ${col.id} <span class="kcol-cnt">${colProjs.length}</span></div>
      </div>
      <div class="kdrop">
        ${colProjs.map(p=>createCardHTML(p)).join('')}
        ${!colProjs.length?'<div class="kempty">Nenhum projeto nesta etapa</div>':''}
      </div>`;
    board.appendChild(el);
  });
  document.getElementById('boardCount').textContent=`${total} projeto${total!==1?'s':''}`;
  pinnedCards.forEach(id=>{const el=board.querySelector(`.kcard[data-id="${id}"]`);if(el)el.classList.add('pinned');});
}

// ══════════════════════════════════════════
//  CARD HTML
// ══════════════════════════════════════════
function createCardHTML(p){
  const pays=p.payments||[];
  const total=parseFloat(p.value||0);
  const paid=pays.reduce((s,x)=>s+parseFloat(x.amount||0),0);
  const rest=total-paid;
  const dl=p.date?new Date(p.date+'T12:00:00'):null;
  const diff=dl?Math.ceil((dl-new Date().setHours(0,0,0,0))/86400000):null;
  let dateCls='',dateBadge='';
  if(dl){if(diff<0){dateCls='b-venc';dateBadge='<span class="badge b-venc">Atrasado</span>';}else if(diff<=7){dateCls='b-urg';dateBadge=`<span class="badge b-urg">${diff}d</span>`;}}
  const pMap={Alta:'b-alta',Média:'b-media',Baixa:'b-baixa'};
  const pIcon={Alta:'🔴',Média:'🟡',Baixa:'🟢'};
  let sClass='',sLabel='';
  if(total>0){if(rest<=0){sClass='b-pago';sLabel='✓ Pago';}else if(paid>0){sClass='b-parcial';sLabel='Parcial';}else{sClass='b-pendente';sLabel='Pendente';}}

  // Finance block
  const isExp=expandedFin.has(p.id);
  let finHtml='';
  if(total>0){
    const hRows=pays.length?pays.map(pg=>`<div class="fin-hist-item"><span style="color:var(--text3);font-size:11px"><i class="bi bi-calendar3"></i> ${pg.date?new Date(pg.date+'T12:00:00').toLocaleDateString('pt-BR'):'—'}</span><span class="fv">+${fmt(pg.amount)}</span></div>`).join(''):'<div class="fin-hist-item" style="color:var(--text3);justify-content:center;font-size:12px">Sem pagamentos</div>';
    finHtml=`<div class="fin-blk">
      <div class="fin-sum">
        <div class="fin-row"><span class="lbl">Total do contrato</span><span class="val">${fmt(total)}</span></div>
        <div class="fin-row"><span class="lbl">Valor pago</span><span class="val" style="color:var(--green)">${fmt(paid)}</span></div>
        <div class="fin-row" style="border-top:1px solid var(--border);padding-top:3px;margin-top:2px">
          <span class="lbl">Saldo restante</span>
          <span class="val" style="color:${rest>0?'var(--red)':'var(--text3)'}">
            ${fmt(rest)} <span class="badge ${sClass}" style="font-size:10px">${sLabel}</span>
          </span>
        </div>
      </div>
      <button class="fin-hist-btn" onclick="toggleFin(${p.id});event.stopPropagation()">
        <i class="bi bi-clock-history"></i> ${pays.length} pagamento${pays.length!==1?'s':''}
        <i class="bi bi-chevron-${isExp?'up':'down'}" style="float:right;margin-top:1px;font-size:10px"></i>
      </button>
      <div class="fin-hist-rows ${isExp?'':'d-none'}">${hRows}</div>
    </div>`;
  }

  // Products block
  const prods=p.products||[];
  let prodsHtml='';
  if(prods.length){
    prodsHtml=`<div style="margin-top:8px">
      <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--text3);margin-bottom:4px"><i class="bi bi-tags-fill"></i> Serviços Contratados</div>
      <table class="prod-table"><thead><tr><th>Serviço</th><th>Valor</th></tr></thead><tbody>
        ${prods.map(pd=>`<tr><td style="font-weight:500">${pd.name}</td><td style="font-family:'Courier New',monospace;font-weight:700;color:var(--green)">${fmt(pd.price)}</td></tr>`).join('')}
      </tbody></table></div>`;
  }

  // Checklist
  const subs=p.subtasks||[];let checkHtml='';
  if(subs.length){
    const done=subs.filter(s=>s.done).length;const pct=(done/subs.length)*100;
    checkHtml=`<div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-top:7px">
      <div style="padding:5px 8px;display:flex;justify-content:space-between;font-size:12px;font-weight:600">
        <span><i class="bi bi-ui-checks"></i> Andamento</span>
        <span style="font-family:'Courier New',monospace">${done}/${subs.length}</span>
      </div>
      <div class="prog" style="margin:0 8px 6px"><div class="prog-fill ${pct===100?'done':''}" style="width:${pct}%"></div></div>
      ${subs.map(s=>`<div class="sub-row"><input type="checkbox" disabled ${s.done?'checked':''}><span class="${s.done?'sub-done':''}">${s.text}</span></div>`).join('')}
    </div>`;
  }

  const noteHtml=p.note?`<p style="font-size:12px;color:var(--text2);margin-top:7px;line-height:1.5;background:var(--surface2);padding:6px 8px;border-radius:6px">${p.note}</p>`:'';

  return `<div class="kcard t-${p.type}" data-id="${p.id}" onclick="togglePin(event,${p.id})">
    ${p.image?`<img src="${p.image}" class="kcard-cover" onerror="this.style.display='none'">`:''}
    <div class="kcard-body">
      <div class="kcard-name">${p.name}</div>
      <div class="kcard-tags">
        ${p.column!=='Concluído'?`<span class="badge ${pMap[p.priority]||'b-baixa'}">${pIcon[p.priority]||'🟢'} ${p.priority}</span>`:''}
        <span class="badge b-t${p.type}">${p.type}</span>
        ${dl
          ?`<span class="badge ${dateCls||''}" style="margin-left:auto">${dl.toLocaleDateString('pt-BR')} ${dateBadge}</span>`
          :(total>0?`<span class="badge ${sClass}" style="margin-left:auto">${sLabel}</span>`:'')}
      </div>
    </div>
    <div class="kcard-exp">
      ${finHtml}${prodsHtml}${checkHtml}${noteHtml}
    </div>
  </div>`;
}

function togglePin(e,id){
  if(e.target.closest('button')||e.target.closest('input'))return;
  const card=e.currentTarget;
  if(pinnedCards.has(id)){pinnedCards.delete(id);card.classList.remove('pinned');}
  else{pinnedCards.add(id);card.classList.add('pinned');}
}
function toggleFin(id){if(expandedFin.has(id))expandedFin.delete(id);else expandedFin.add(id);renderBoard();}

document.addEventListener('DOMContentLoaded',loadData);
</script>
